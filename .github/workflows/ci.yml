name: ci

on:
  push:
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Run tests
        run: go test -count=1 ./...

      - name: Run vet
        run: go vet ./...

      - name: Build binary
        run: go build -o bamsampler ./cmd
